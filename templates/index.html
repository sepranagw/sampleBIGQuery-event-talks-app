<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BigQuery Release Notes</title>
  <meta name="description" content="Browse the latest Google BigQuery release notes and share updates directly to Twitter." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- Background orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <header>
    <div class="header-inner">
      <div class="header-brand">
        <div class="bq-icon" aria-hidden="true">
          <svg width="32" height="32" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="64" height="64" rx="14" fill="url(#bqGrad)"/>
            <path d="M20 44 L32 20 L44 44 Z" fill="white" opacity="0.9"/>
            <circle cx="44" cy="40" r="6" fill="white" opacity="0.7"/>
            <defs>
              <linearGradient id="bqGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#1a73e8"/>
                <stop offset="100%" stop-color="#0d47a1"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div>
          <h1>BigQuery Release Notes</h1>
          <p class="header-sub">Google Cloud · Latest updates &amp; announcements</p>
        </div>
      </div>
      <div class="header-actions">
        <span class="entry-count" id="entryCount" aria-live="polite"></span>
        <button id="refreshBtn" class="btn btn-primary" title="Refresh release notes">
          <svg class="btn-icon spin-icon" id="spinnerIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
          <span id="refreshLabel">Refresh</span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <!-- Tweet bar (appears when items selected) -->
    <div class="tweet-bar" id="tweetBar" role="region" aria-label="Tweet selection toolbar">
      <div class="tweet-bar-inner">
        <span class="tweet-bar-count" id="tweetBarCount"></span>
        <div class="tweet-bar-actions">
          <button class="btn btn-ghost" id="clearSelectionBtn">Clear selection</button>
          <button class="btn btn-tweet" id="tweetBtn" title="Tweet selected updates">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.259 5.631L18.244 2.25Zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77Z"/>
            </svg>
            Tweet selected
          </button>
        </div>
      </div>
    </div>

    <!-- Error banner -->
    <div class="error-banner" id="errorBanner" role="alert" aria-live="assertive" hidden>
      <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errorMessage"></span>
    </div>

    <!-- Skeleton loader -->
    <div class="entries-grid" id="skeletonGrid" aria-hidden="true">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>

    <!-- Release notes grid -->
    <div class="entries-grid" id="entriesGrid" aria-label="BigQuery release notes"></div>
  </main>

  <!-- Tweet modal -->
  <div class="modal-overlay" id="tweetModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.259 5.631L18.244 2.25Zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77Z"/></svg>
          Compose Tweet
        </h2>
        <button class="modal-close" id="modalClose" aria-label="Close modal">✕</button>
      </div>
      <div class="modal-body">
        <textarea id="tweetText" maxlength="280" rows="5" placeholder="Your tweet content..."></textarea>
        <div class="char-counter"><span id="charCount">0</span> / 280</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modalCancel">Cancel</button>
        <button class="btn btn-tweet" id="modalTweetBtn">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.259 5.631L18.244 2.25Zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77Z"/></svg>
          Open in X / Twitter
        </button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
